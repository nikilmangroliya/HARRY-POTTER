<!DOCTYPE html>
<html lang="en" class="lenis lenis-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Members | Hogwarts</title>
    <meta name="description" content="A gallery of witches and wizards who have pledged their allegiance.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
    
    <style>
        /* Lenis Smooth Scroll Boilerplate */
        html.lenis, html.lenis body { height: auto; width: 100vw; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-smooth iframe { pointer-events: none; }

        /* BASE RESETS AND VIEWPORT LOCK */
        body, html { 
            margin: 0; padding: 0; 
            background-color: #110e0c; color: #2C1A0F; 
            font-family: 'Cormorant Garamond', serif; line-height: 1.6; 
            overflow-x: hidden; width: 100%; max-width: 100vw; 
            min-height: 100dvh; 
        }
        h1, h2, h3, h4 { font-family: 'Cinzel', serif; letter-spacing: 2px; color: #3e2723; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        *:focus-visible { outline: 2px solid #740001; outline-offset: 2px; }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
        
        .parchment-bg {
            background-color: #F4E8C1;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.05"/></svg>');
            border: 6px double #5A3A18;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 60px rgba(90, 58, 24, 0.3);
            position: relative;
        }
        .text-glow { text-shadow: 0 0 20px rgba(220, 180, 80, 0.6); }
        .parchment-input {
            background-color: rgba(255, 255, 255, 0.3);
            border: 1px solid #8B5A2B;
            border-bottom: 2px solid #5A3A18;
            color: #2C1A0F;
            transition: all 0.3s ease;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .parchment-input:focus { border-color: #740001; border-bottom-color: #740001; box-shadow: 0 4px 10px rgba(116, 0, 1, 0.1); outline: none; background-color: rgba(255, 255, 255, 0.5); }
        .parchment-input::placeholder { color: #8B5A2B; opacity: 0.7; font-style: italic; }
        .parchment-input:focus + i { color: #740001; transform: translateY(-50%) scale(1.1); }
        
        .btn-magic {
            background-color: #740001; color: #F4E8C1; border: 2px solid #4A3018; transition: all 0.3s ease;
            font-family: 'Cinzel', serif; letter-spacing: 3px; text-transform: uppercase; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-magic:hover { background-color: #5A0001; box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 6px 20px rgba(0,0,0,0.5); transform: translateY(-2px); }
        .btn-magic:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .badge {
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            will-change: transform, box-shadow;
            transform: rotate(var(--tilt, 0deg));
        }
        .badge:hover, .badge.touch-hover {
            transform: translateY(-12px) rotate(0deg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 60px rgba(90, 58, 24, 0.5);
        }
        @media (hover: none) {
            .badge.touch-hover img { transform: scale(1.1); }
        }
        .magic-glass {
            background: linear-gradient(135deg, rgba(16, 20, 28, 0.75), rgba(10, 12, 18, 0.9));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-top: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8), inset 0 1px 0 rgba(212,175,55,0.15);
        }
        
        #music-icon { animation: musicPulse 1.5s ease-in-out infinite; }
        #music-btn.muted #music-icon { animation: none; opacity: 0.4; }
        #music-btn.muted #music-label { opacity: 0.4; }
        @keyframes musicPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        @keyframes foilSweep {
            0% { background-position: 200% 0; }
            100% { background-position: -100% 0; }
        }
        .foil-sweep { background-size: 200% 100%; animation: foilSweep 3s linear infinite; }
    </style>
</head>
<body>

    <div class="fixed inset-0 z-0 pointer-events-none" style="isolation: isolate;">
        <img src="assets/HARRY.jpg" alt="Bg" class="absolute inset-0 w-full h-full object-cover opacity-60" style="filter: sepia(0.6) brightness(0.4) contrast(1.2);">
        <div class="absolute inset-0 backdrop-blur-sm bg-[#1a0f0a]/60"></div>
    </div>

    <nav class="fixed top-6 left-0 right-0 z-50 px-4 md:px-12 flex justify-between items-center max-w-7xl mx-auto">
        <a href="index.html" class="parchment-bg px-3 py-2 sm:px-6 sm:py-3 flex items-center gap-2 sm:gap-3 hover:brightness-110 transition-all text-[#2C1A0F]" style="border-width: 2px;">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            <span class="font-cinzel font-bold tracking-[0.1em] sm:tracking-[0.2em] text-[10px] sm:text-sm">BACK TO HOGWARTS</span>
        </a>
    </nav>

    <main class="relative z-10 min-h-screen pt-28 pb-20 px-4 md:px-8">
        <div class="max-w-6xl w-full mx-auto">
            <div class="text-center mb-8 sm:mb-16">
                <p class="text-[#E6C259] tracking-[0.3em] sm:tracking-[0.5em] text-[10px] sm:text-xs uppercase mb-2 sm:mb-3 text-glow font-bold">Hogwarts Archives</p>
                <h1 class="font-cinzel text-2xl sm:text-4xl md:text-6xl font-bold text-[#F4E8C1] mb-2 sm:mb-3 drop-shadow-lg">Hall of Members</h1>
                <p class="text-[#Eee3cf] text-xs sm:text-sm tracking-widest italic px-4 mb-6">A gallery of witches and wizards who have pledged their allegiance.</p>
                <a href="index.html#houses" class="btn-magic inline-flex items-center justify-center gap-2 font-bold text-[10px] sm:text-xs px-6 py-3 rounded-full">
                    Join An Alliance <i data-lucide="shield-check" class="w-4 h-4"></i>
                </a>
            </div>

            <div class="mb-8 sm:mb-12 max-w-lg mx-auto">
                <div class="relative">
                    <input type="text" id="search-bar" placeholder="Search for a member..." class="w-full parchment-input rounded-full px-4 py-3 pl-11 sm:px-6 sm:py-4 sm:pl-14 text-sm sm:text-lg transition-all">
                    <i data-lucide="search" class="absolute left-4 sm:left-5 top-1/2 -translate-y-1/2 w-4 h-4 sm:w-5 sm:h-5 text-[#5A3A18] pointer-events-none transition-all"></i>
                </div>
            </div>

            <div id="badge-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 md:gap-10">
                </div>
        </div>
    </main>

    <audio id="bg-music" src="assets/HARRY.mp3" loop preload="auto"></audio>
    <button id="music-btn" title="Toggle Music" aria-label="Toggle Music" class="fixed bottom-6 right-6 z-[9998] btn-magic flex items-center justify-center w-12 h-12 rounded-full cursor-pointer">
        <span id="music-icon" class="text-lg">♪</span>
        <span id="music-label" class="hidden">MUSIC</span>
    </button>
    <div id="music-reminder" class="fixed bottom-20 right-6 z-[9997] magic-glass px-4 py-3 rounded-lg flex items-center gap-3 transform translate-y-4 opacity-0 pointer-events-none transition-all duration-500 cursor-pointer hover:border-[#D4AF37] hover:bg-[#D4AF37]/10 shadow-[0_0_20px_rgba(212,175,55,0.2)]">
        <i data-lucide="volume-x" class="w-4 h-4 text-[#D4AF37]"></i>
        <span class="font-montserrat text-white text-[10px] tracking-[2px] uppercase font-bold">Click me to turn on</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // Refined Lenis for Buttery Feel Syncing with GSAP
            const lenis = new Lenis({
                duration: 1.5,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
                smoothWheel: true,
                wheelMultiplier: 1.2,
                touchMultiplier: 2
            });
            
            lenis.on('scroll', ScrollTrigger.update);
            gsap.ticker.add((time) => lenis.raf(time * 1000));
            gsap.ticker.lagSmoothing(0);

            const houseDetails = {
                "Gryffindor": { emblem: "assets/gryffindor.png", color1: "#740001", color2: "#D4AF37" },
                "Ravenclaw": { emblem: "assets/ravenclaw.png", color1: "#0E1A40", color2: "#946B2D" },
                "Hufflepuff": { emblem: "assets/hufflepuff.png", color1: "#FFD800", color2: "#372e29" },
                "Slytherin": { emblem: "assets/slytherin.png", color1: "#1A472A", color2: "#AAAAAA" }
            };
            const houseNames = Object.keys(houseDetails);

            const existingMembers = [
                { name: "Nikil Mangroliya", house: "Gryffindor", emblem: "assets/gryffindor.png", color1: "#740001", color2: "#D4AF37" },
                { name: "Luna Lovegood", house: "Ravenclaw", emblem: "assets/ravenclaw.png", color1: "#0E1A40", color2: "#946B2D" },
                { name: "Cedric Diggory", house: "Hufflepuff", emblem: "assets/hufflepuff.png", color1: "#FFD800", color2: "#372e29" },
                { name: "Draco Malfoy", house: "Slytherin", emblem: "assets/slytherin.png", color1: "#1A472A", color2: "#AAAAAA" },
                { name: "Ginny Weasley", house: "Gryffindor", emblem: "assets/gryffindor.png", color1: "#740001", color2: "#D4AF37" },
                { name: "Newt Scamander", house: "Hufflepuff", emblem: "assets/hufflepuff.png", color1: "#FFD800", color2: "#372e29" },
                { name: "Severus Snape", house: "Slytherin", emblem: "assets/slytherin.png", color1: "#1A472A", color2: "#AAAAAA" },
                { name: "Filius Flitwick", house: "Ravenclaw", emblem: "assets/ravenclaw.png", color1: "#0E1A40", color2: "#946B2D" },
                { name: "Remus Lupin", house: "Gryffindor", emblem: "assets/gryffindor.png", color1: "#740001", color2: "#D4AF37" },
                { name: "Bellatrix Lestrange", house: "Slytherin", emblem: "assets/slytherin.png", color1: "#1A472A", color2: "#AAAAAA" },
                { name: "N. Tonks", house: "Hufflepuff", emblem: "assets/hufflepuff.png", color1: "#FFD800", color2: "#372e29" },
                { name: "G. Lockhart", house: "Ravenclaw", emblem: "assets/ravenclaw.png", color1: "#0E1A40", color2: "#946B2D" },
            ];

            const newNames = [
                "Harsh Lakhani", "Isha Jivani", "Ayush Isamaliya", "Arpit Vaghani", "Parth Badreshiya", "Denish Katariya",
                "Yashvi Mangukiya", "Parth Lakhani", "Hensi Sorathiya", "Nirali Goswami", "Harmish Raval", "Mann Patel",
                "Het Movaliya", "Rudra Roy", "Krish Lathiya", "Meet Kachadiya", "Saloni Vaghani", "Mansi Padsala",
                "Radha Monpara", "Krisha Mavani", "Pruthvi Golakiya", "Tejas Sojitra", "Fenil Savaliya", "Himani Vavaleeya",
                "Mitaxi Savaliya", "Jeel Lathiya", "Divyesh Chauhan", "Harsh Pandav", "Tithi Thummar", "Compus Mentor",
                "Himanshu Gohil", "Pratham Sojitra", "Raj Lathiya", "Dakshkumar Kakadiya", "Yash Jethva", "Ved Maniya",
                "Aryan Shingala", "Drashti Savaliya", "Priyanshi Parmar", "Shyam Savaliya", "Jenisha Kanani", "Dhruvika Kapadiya",
                "Dhruvi Kabariya", "Miral Kotadiya", "Ronakkumar Beladiya", "Jay Kakadiya", "Sara Hirpara", "Shruti Korat",
                "Rutva Rakholiya", "Mahek Sanghani", "Priyansiben Malaviya", "Jensi Sukhadiya", "Kris Nakrani",
                "Fena Kathiriya", "Jiya Gopani", "Kismat Pansheriya", "Raj Mavani", "Ekta Sardhara", "Zalak Rudani",
                "Tanvi Kunadiya", "Bhumi Savaliya", "Aarav Gadhiya", "Sukhesh Kalathiya", "Kasak Gangani", "Jenish Ghelani",
                "Ruchit Chovatiya", "Kuldip Gohel", "Rohit Vala", "Naitik Vala", "Arti Zinzala", "Zalak Kakadiya",
                "Jinal Shiyani", "Janvi Savaliya", "Kenil Savaliya", "Jash Sakariya", "Kenil Chodvadiya", "Gautam Devani",
                "Krina Hirpara", "Shaili Jivani", "Kartik Chabhadiya", "Sumit Gohil", "Ami Miyani", "Vanshitya Motisariya",
                "Nishchay Sudani", "Trupil Vadadoriya", "Vanshika Anghan", "Yashvi Gorashiya", "Raj Madhvani", "Dhruv Ramani",
                "Tanvi Babariya", "Zinsa Jasoliya", "Ami Koladiya", "Charmi Bagadiya", "Gopi Nayani", "Princy Sakadasariya",
                "Dhruv Borda", "Laksh Gaudani", "Pratixa Jayani", "Jenish Avaiya", "Daksh Dungrani",
                "Manav Kaneriya", "Utsav Dobariya", "Smit Pansuriya", "Pritam Savaliya", "Janvi Shilu", "Ami Nakrani",
                "Upasana Kheni", "Anshita Khokhariya", "Hetavi Kumbhani", "Krishna Shingala", "Raina Ghevariya", "Vishva Bhalala",
                "Harshil Diyora", "Twisha Postiwala", "Raj Kheni", "Tanish Gajera", "Urvish Nakrani", "Krisha Vaghani",
                "Krisha Maniya", "Priyansi Nathani", "Vraj Kachhadiya", "Dishant Kathiriya", "Dhruvin Katrodiya", "Mansi Nakrani",
                "Ritu Balar", "Bhakti Gadhiya", "Krish Goti", "Raj Tejani", "Aman Vaghela", "Het Sohaliya"
            ];

            const newMembers = newNames.map(name => {
                const randomHouse = houseNames[Math.floor(Math.random() * houseNames.length)];
                return {
                    name: name,
                    house: randomHouse,
                    ...houseDetails[randomHouse]
                };
            });

            const members = existingMembers.concat(newMembers);
            const grid = document.getElementById('badge-grid');
            
            // Performance Refactor: Build HTML string once, then inject into DOM.
            const badgeHTML = members.map(member => {
                const tilt = (Math.random() * 6 - 3).toFixed(2);
                return `
                    <div class="badge parchment-bg group aspect-square p-2 sm:p-4 md:p-6 flex flex-col items-center justify-center text-center relative overflow-hidden" style="--house-color-1: ${member.color1}; --house-color-2: ${member.color2}; --tilt: ${tilt}deg; border-width: 4px;">
                        <img src="${member.emblem}" loading="lazy" class="relative z-10 w-[35%] sm:w-[40%] aspect-square object-cover rounded-full border-2 border-[#5A3A18] mb-2 sm:mb-4 shadow-md transition-transform duration-500 group-hover:scale-110">
                        <h3 class="relative z-10 font-cinzel text-xs sm:text-sm md:text-base lg:text-lg font-bold text-[#2C1A0F] leading-snug tracking-wider px-1 break-words w-full">${member.name}</h3>
                        <div class="relative z-10 w-8 sm:w-12 h-[1px] sm:h-[2px] my-3 sm:my-5 opacity-80 transition-colors duration-500 group-hover:bg-[var(--house-color-1)]" style="background-color: #8B5A2B;"></div>
                        <p class="relative z-10 font-cormorant text-[8px] sm:text-xs tracking-[0.2em] text-[#5A3A18] uppercase mb-0.5 sm:mb-1 font-bold">Member of</p>
                        <p class="relative z-10 font-cinzel text-[10px] sm:text-xs md:text-sm font-bold tracking-widest uppercase transition-colors duration-500" style="color: var(--house-color-1);">${member.house}</p>
                    </div>
                `;
            }).join('');
            grid.innerHTML = badgeHTML;

            const searchBar = document.getElementById('search-bar');
            const badges = grid.querySelectorAll('.badge');

            // Performance Refactor: Debounce search input to prevent lag.
            function debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            };

            const debouncedSearch = debounce((e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                badges.forEach(badge => {
                    const memberName = badge.querySelector('h3').textContent.toLowerCase();
                    const isVisible = memberName.includes(searchTerm);
                    badge.style.display = isVisible ? 'flex' : 'none';
                });
            }, 250);

            searchBar.addEventListener('input', debouncedSearch);

            // Audio Setup
            const bgMusic = document.getElementById('bg-music'); 
            const musicBtn = document.getElementById('music-btn'); 
            const musicIcon = document.getElementById('music-icon'); 
            const musicLabel = document.getElementById('music-label'); 
            const musicReminder = document.getElementById('music-reminder'); 

            if (bgMusic && musicBtn) { 
                bgMusic.volume = 0.35; 
                let reminderInterval; 

                function startReminder() { 
                    if (reminderInterval) clearInterval(reminderInterval); 
                    reminderInterval = setInterval(() => { 
                        if (bgMusic.paused) { 
                            musicReminder.classList.remove('translate-y-4', 'opacity-0', 'pointer-events-none'); 
                            setTimeout(() => { musicReminder.classList.add('translate-y-4', 'opacity-0', 'pointer-events-none'); }, 4000); 
                        } 
                    }, 7000); 
                } 

                function stopReminder() { 
                    if (reminderInterval) clearInterval(reminderInterval); 
                    musicReminder.classList.add('translate-y-4', 'opacity-0', 'pointer-events-none'); 
                } 

                musicReminder.addEventListener('click', () => { 
                    bgMusic.play(); setMusicUI(false); 
                }); 

                bgMusic.addEventListener('timeupdate', () => { 
                    if (!window.musicSaveTimeout) { 
                        window.musicSaveTimeout = setTimeout(() => { 
                            localStorage.setItem('musicTime', bgMusic.currentTime); 
                            localStorage.setItem('musicMuted', bgMusic.paused); 
                            window.musicSaveTimeout = null; 
                        }, 500); 
                    } 
                }); 

                window.addEventListener('beforeunload', () => { 
                    localStorage.setItem('musicTime', bgMusic.currentTime); 
                    localStorage.setItem('musicMuted', bgMusic.paused); 
                }); 

                function setMusicUI(isMuted) { 
                    if (isMuted) { 
                        musicIcon.textContent = '♪'; 
                        musicLabel.textContent = 'MUTED'; 
                        musicBtn.classList.add('muted'); 
                        startReminder(); 
                    } else { 
                        musicIcon.textContent = '♪'; 
                        musicLabel.textContent = 'MUSIC'; 
                        musicBtn.classList.remove('muted'); 
                        stopReminder(); 
                    } 
                } 

                function initializeMusic() { 
                    const savedTime = parseFloat(localStorage.getItem('musicTime')) || 0; 
                    const wasMuted = localStorage.getItem('musicMuted') === 'true'; 
                    if (savedTime > 0) { bgMusic.currentTime = savedTime; } 
                    setMusicUI(wasMuted); 
                    if (!wasMuted) { 
                        const playPromise = bgMusic.play(); 
                        if (playPromise !== undefined) { 
                            playPromise.catch(error => { setMusicUI(true); localStorage.setItem('musicMuted', 'true'); }); 
                        } 
                    } 
                } 
                
                initializeMusic(); 
                
                musicBtn.addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    if (bgMusic.paused) { bgMusic.play(); setMusicUI(false); } 
                    else { bgMusic.pause(); setMusicUI(true); } 
                }); 
            }

            // Auto Hover System for Touch Devices (Android/iOS)
            if (window.matchMedia("(hover: none)").matches) {
                const touchHoverObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('touch-hover');
                        } else {
                            entry.target.classList.remove('touch-hover');
                        }
                    });
                }, { threshold: 0.6 });

                setTimeout(() => {
                    document.querySelectorAll('.badge').forEach(el => touchHoverObserver.observe(el));
                }, 500);
            }
        });
    </script>
</body>
</html>
